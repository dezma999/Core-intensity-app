<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CoreIntensity App</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CoreIntensity">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="app-container">
        <header>
            <h1>Core<span>Intensity</span></h1>
            <p>Core, Hips & Waist Workout</p>
        </header>

        <div class="badge-container">
            <span class="badge">Day 1 🔥</span>
            <span class="badge">3 Day Streak ⚡</span>
            <span class="badge">Core Master 👑</span>
        </div>

        <div class="exercise-display">
            <div id="exercise-icon-container">
                <svg id="demo-svg" viewBox="0 0 100 100" class="exercise-icon"></svg>
            </div>
            <div id="current-move">Get Ready!</div>
            <div id="exercise-demo-tip">Form Tip: Prepare your posture.</div>
            <span id="status-badge" class="status-rest">Prepare</span>
        </div>

        <div class="timer-container">
            <canvas id="timer-ring" width="170" height="170"></canvas>
            <div class="timer-text-box">
                <div id="time-left">00</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">Interval</div>
                <div class="stat-val" id="current-interval">0 / 8</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Total Time</div>
                <div class="stat-val" id="total-duration">04:00</div>
            </div>
        </div>

        <button class="controls-btn" id="start-btn">START WORKOUT</button>
        <button class="nutrition-trigger-btn" id="open-nutrition-btn">📅 Weekly Meal Plan</button>
    </div>

    <div class="modal-overlay" id="nutrition-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Weekly Meal Plan</h2>
                <button class="close-modal" id="close-nutrition-btn">&times;</button>
            </div>
            
            <div class="calendar-row">
                <div class="day-tab active" data-day="mon">M</div>
                <div class="day-tab" data-day="tue">T</div>
                <div class="day-tab" data-day="wed">W</div>
                <div class="day-tab" data-day="thu">T</div>
                <div class="day-tab" data-day="fri">F</div>
                <div class="day-tab" data-day="sat">S</div>
                <div class="day-tab" data-day="sun">S</div>
            </div>

            <div id="meals-container"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
